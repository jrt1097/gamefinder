<!DOCTYPE html>
<html>
<head>
  <title>GameFinder - All Events</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: Arial, sans-serif;
    background: #eef2f7;
    margin: 0;
    color: #111827;
  }

  header {
    background: linear-gradient(135deg, #111827, #1e3a8a);
    color: white;
    padding: 45px 20px;
    text-align: center;
  }

  header h1 {
    margin: 0;
    font-size: 42px;
  }

  header p {
    margin-top: 10px;
    font-size: 18px;
    color: #dbeafe;
  }

  main {
    max-width: 1100px;
    margin: 30px auto;
    padding: 20px;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 22px;
    flex-wrap: wrap;
    align-items: center;
  }

  .box,
  .event-card {
    background: white;
    padding: 24px;
    margin-bottom: 18px;
    border-radius: 16px;
    box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
    border: 1px solid #e5e7eb;
  }

  .event-card {
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .event-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
  }

  input,
  select,
  textarea {
    padding: 12px;
    font-size: 15px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    outline: none;
    background: white;
  }

  input:focus,
  select:focus,
  textarea:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  }

  textarea {
    width: 100%;
    min-height: 90px;
    resize: vertical;
  }

  button {
    padding: 12px 16px;
    font-size: 15px;
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 10px;
    font-weight: bold;
  }

  button:hover {
    background: #1d4ed8;
  }

  .controls button {
    background: #111827;
  }

  .controls button:hover {
    background: #374151;
  }

  .category {
    display: inline-block;
    background: #dbeafe;
    color: #1e40af;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: bold;
  }

  .event-card h2 {
    margin-top: 12px;
    margin-bottom: 12px;
    font-size: 26px;
  }

  .event-card p {
    line-height: 1.5;
  }

  .status {
    font-weight: bold;
    color: #1f2937;
  }

  .create-form {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin-bottom: 18px;
  }

  #events,
  #joinedEvents {
    margin-top: 20px;
  }

  .message {
    background: #f8fafc;
    border: 1px solid #e5e7eb;
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 12px;
  }

  .message p {
    margin: 5px 0;
  }

  small {
    color: #64748b;
  }

  @media (max-width: 700px) {
    header h1 {
      font-size: 32px;
    }

    .create-form {
      grid-template-columns: 1fr;
    }

    .controls {
      flex-direction: column;
      align-items: stretch;
    }

    button,
    input,
    select {
      width: 100%;
    }
  }
</style>
</head>

<body>

<header>
  <h1>GameFinda</h1>
  <p>Find gaming, sports, and community events near you.</p>
</header>

<main>

  <!-- NAVIGATION -->
  <div class="controls">
    <button onclick="goTo('index.html')">All Events</button>
    <button onclick="goTo('joined.html')">My Joined Events</button>
    <button onclick="goTo('create.html')">Create Event</button>
  </div>

  <!-- LOGIN -->
  <div class="box">
    <h2>Login</h2>

    <div id="g_id_onload"
         data-client_id="806474530135-eu9tcf85pn9t8k92c34uir3u6gvmoaka.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>

    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="sign_in_with">
    </div>

    <p id="userStatus" class="status">Not signed in</p>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- LOCATION -->
  <div class="box">
    <h2>Nearby Events</h2>
    <button onclick="getUserLocation()">Use My Location</button>
    <p id="locationStatus">Location not enabled.</p>
  </div>

  <!-- FILTERS -->
  <div class="controls">
    <input id="searchInput" type="text" placeholder="Search events...">

    <select id="categorySelect">
      <option value="All">All Categories</option>
      <option value="Gaming">Gaming</option>
      <option value="Sports">Sports</option>
      <option value="Community">Community</option>
    </select>

    <select id="distanceSelect">
      <option value="100">Within 100 miles</option>
      <option value="50">Within 50 miles</option>
      <option value="25">Within 25 miles</option>
      <option value="10">Within 10 miles</option>
    </select>

    <button onclick="loadEvents()">Search</button>
  </div>

  <!-- EVENTS -->
  <div id="events"></div>

</main>

<script>
const API_URL = "https://nou2ovsqehcyxf5i2ztoecwqxy0ydeir.lambda-url.us-east-1.on.aws";

let idToken = localStorage.getItem("gamefinder_token");
let userLatitude = null;
let userLongitude = null;

document.addEventListener("DOMContentLoaded", () => {
  if (idToken) {
    document.getElementById("userStatus").innerText = "Signed in with Google";
  }
});

function goTo(page) {
  window.location.href = page;
}

function handleCredentialResponse(response) {
  idToken = response.credential;
  localStorage.setItem("gamefinder_token", idToken);
  document.getElementById("userStatus").innerText = "Signed in with Google";
}

function logout() {
  idToken = null;
  localStorage.removeItem("gamefinder_token");
  document.getElementById("userStatus").innerText = "Not signed in";
}

function getUserLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    userLatitude = pos.coords.latitude;
    userLongitude = pos.coords.longitude;

    document.getElementById("locationStatus").innerText =
      "Location enabled";

    loadEvents();
  });
}

function calculateDistance(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const toRad = x => x * Math.PI / 180;

  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1)) *
    Math.cos(toRad(lat2)) *
    Math.sin(dLon/2)**2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function viewEvent(id) {
  window.location.href = `event.html?id=${id}`;
}

async function loadEvents() {
  const res = await fetch(`${API_URL}/events`);
  const events = await res.json();

  const search = document.getElementById("searchInput").value.toLowerCase();
  const category = document.getElementById("categorySelect").value;
  const maxDistance = Number(document.getElementById("distanceSelect").value);

  const container = document.getElementById("events");
  container.innerHTML = "";

  events.forEach(event => {

    let distanceText = "Enable location";

    if (userLatitude && event.latitude) {
      const dist = calculateDistance(
        userLatitude,
        userLongitude,
        event.latitude,
        event.longitude
      );

      if (dist > maxDistance) return;

      distanceText = dist.toFixed(1) + " miles away";
    }

    if (
      !event.title.toLowerCase().includes(search) &&
      !event.location.toLowerCase().includes(search)
    ) return;

    if (category !== "All" && event.category !== category) return;

    container.innerHTML += `
      <div class="event-card">
        <span class="category">${event.category}</span>
        <h2>${event.title}</h2>
        <p><strong>Location:</strong> ${event.location}</p>
        <p><strong>Distance:</strong> ${distanceText}</p>
        <p><strong>Date:</strong> ${event.date}</p>
        <p><strong>Time:</strong> ${event.time}</p>
        <p>${event.description}</p>

        <button onclick="joinEvent(${event.id})">Join Event</button>
        <button onclick="leaveEvent(${event.id})">Leave Event</button>
        <button onclick="viewEvent(${event.id})">View Event</button>
      </div>
    `;
  });
}

async function joinEvent(id) {
  if (!idToken) {
    alert("Sign in first");
    return;
  }

  await fetch(`${API_URL}/events/${id}/join`, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${idToken}`
    }
  });

  alert("Joined event");
  loadEvents();
}

async function leaveEvent(id) {
  if (!idToken) {
    alert("Sign in first");
    return;
  }

  const response = await fetch(`${API_URL}/events/${id}/leave`, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${idToken}`
    }
  });

  const result = await response.json();

  if (!response.ok) {
    alert(result.message || "Could not leave event.");
    return;
  }

  alert("Left event successfully.");
  loadEvents();
}

loadEvents();
</script>

</body>
</html>
