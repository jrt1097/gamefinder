<!DOCTYPE html>
<html>
<head>
  <title>GameFinder - Event Details</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background:
      radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 30%),
      linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
    margin: 0;
    color: #111827;
  }

  header {
    background:
      linear-gradient(135deg, rgba(17, 24, 39, 0.96), rgba(30, 58, 138, 0.96)),
      radial-gradient(circle at top right, rgba(96, 165, 250, 0.45), transparent 35%);
    color: white;
    padding: 56px 20px 64px;
    text-align: center;
  }

  header h1 {
    margin: 0;
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -1px;
  }

  header p {
    margin: 12px auto 0;
    font-size: 18px;
    color: #dbeafe;
    max-width: 650px;
  }

  main {
    max-width: 1120px;
    margin: -28px auto 40px;
    padding: 0 20px 24px;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 22px;
    flex-wrap: wrap;
    align-items: center;
  }

  .controls:first-child {
    background: rgba(255, 255, 255, 0.94);
    backdrop-filter: blur(10px);
    padding: 14px;
    border-radius: 18px;
    box-shadow: 0 14px 35px rgba(15, 23, 42, 0.14);
    border: 1px solid rgba(226, 232, 240, 0.9);
  }

  .box,
  .event-card {
    background: rgba(255, 255, 255, 0.96);
    padding: 26px;
    margin-bottom: 20px;
    border-radius: 20px;
    box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    border: 1px solid #e5e7eb;
  }

  .box h2 {
    margin-top: 0;
    margin-bottom: 14px;
    font-size: 23px;
    color: #0f172a;
  }

  .box:first-of-type {
    position: relative;
    overflow: hidden;
    border: 1px solid #bfdbfe;
    background:
      linear-gradient(135deg, #ffffff 0%, #eff6ff 100%);
  }

  .box:first-of-type::before {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: 6px;
    background: linear-gradient(180deg, #2563eb, #60a5fa);
  }

  .g_id_signin {
    margin: 12px 0 14px;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 6px 0 14px;
    padding: 8px 12px;
    border-radius: 999px;
    background: #f1f5f9;
    color: #334155;
    font-size: 14px;
    font-weight: 700;
    box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.24);
  }

  .status::before {
    content: "●";
    color: #ef4444;
    font-size: 12px;
  }

  .event-card {
    transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
  }

  .event-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 18px 38px rgba(15, 23, 42, 0.13);
    border-color: #bfdbfe;
  }

  input,
  select,
  textarea {
    padding: 13px 14px;
    font-size: 15px;
    border: 1px solid #cbd5e1;
    border-radius: 12px;
    outline: none;
    background: white;
    color: #111827;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
  }

  input::placeholder,
  textarea::placeholder {
    color: #94a3b8;
  }

  input:focus,
  select:focus,
  textarea:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
  }

  textarea {
    width: 100%;
    min-height: 100px;
    resize: vertical;
  }

  button {
    padding: 12px 17px;
    font-size: 15px;
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 12px;
    font-weight: 700;
    box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
    transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
  }

  button:hover {
    background: #1d4ed8;
    transform: translateY(-1px);
    box-shadow: 0 12px 24px rgba(37, 99, 235, 0.28);
  }

  button:active {
    transform: translateY(0);
  }

  .controls button {
    background: #111827;
    box-shadow: 0 8px 18px rgba(17, 24, 39, 0.18);
  }

  .controls button:hover {
    background: #374151;
  }

  .category {
    display: inline-block;
    background: #dbeafe;
    color: #1e40af;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .event-card h2 {
    margin-top: 14px;
    margin-bottom: 12px;
    font-size: 28px;
    color: #0f172a;
  }

  .event-card p,
  .box p {
    line-height: 1.55;
    color: #334155;
  }

  .event-card strong,
  .box strong {
    color: #0f172a;
  }

  .create-form {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin-bottom: 18px;
  }

  #events,
  #joinedEvents,
  #participants,
  #messages {
    margin-top: 20px;
  }

  #events > p,
  #joinedEvents > p,
  #participants > p,
  #messages > p {
    background: white;
    padding: 18px;
    border-radius: 16px;
    border: 1px solid #e5e7eb;
    color: #475569;
    box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
  }

  .message {
    background: #f8fafc;
    border: 1px solid #e5e7eb;
    padding: 16px;
    border-radius: 14px;
    margin-bottom: 12px;
  }

  .message p {
    margin: 5px 0;
  }

  small {
    color: #64748b;
  }

  ul {
    background: #f8fafc;
    padding: 18px 18px 18px 36px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
  }

  li {
    margin-bottom: 8px;
    color: #334155;
  }

  @media (max-width: 700px) {
    header {
      padding: 40px 18px 54px;
    }

    header h1 {
      font-size: 34px;
    }

    header p {
      font-size: 16px;
    }

    main {
      margin-top: -20px;
      padding: 0 14px 22px;
    }

    .box,
    .event-card {
      padding: 20px;
      border-radius: 16px;
    }

    .create-form {
      grid-template-columns: 1fr;
    }

    .controls {
      flex-direction: column;
      align-items: stretch;
    }

    button,
    input,
    select {
      width: 100%;
    }
  }
</style>
</head>

<body>
  <header>
    <h1>Event Details</h1>
    <p>View participants and chat with others in the event.</p>
  </header>

  <main>
    <div class="controls">
      <button onclick="goTo('index.html')">All Events</button>
      <button onclick="goTo('joined.html')">My Joined Events</button>
      <button onclick="goTo('create.html')">Create Event</button>
    </div>

    <div class="box">
      <h2>Login</h2>

      <div id="g_id_onload"
           data-client_id="806474530135-eu9tcf85pn9t8k92c34uir3u6gvmoaka.apps.googleusercontent.com"
           data-callback="handleCredentialResponse">
      </div>

      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="outline"
           data-text="sign_in_with"
           data-shape="rectangular">
      </div>

      <p id="userStatus" class="status">Not signed in</p>
      <button onclick="logout()">Logout</button>
    </div>

    <div id="eventDetails" class="box"></div>

    <div class="box">
      <h2>Participants</h2>
      <div id="participants"></div>
    </div>

    <div class="box">
      <h2>Event Chat</h2>
      <div id="messages"></div>

      <br>
      <textarea id="messageInput" placeholder="Write a message..."></textarea>
      <br><br>
      <button onclick="sendMessage()">Send Message</button>
      <p id="chatStatus"></p>
    </div>
  </main>

  <script>
    const API_URL = "https://nou2ovsqehcyxf5i2ztoecwqxy0ydeir.lambda-url.us-east-1.on.aws";

    let idToken = localStorage.getItem("gamefinder_token");
    const params = new URLSearchParams(window.location.search);
    const eventId = params.get("id");

    document.addEventListener("DOMContentLoaded", () => {
      if (idToken) {
        document.getElementById("userStatus").innerText = "Signed in with Google";
      }

      loadEventDetails();
      loadMessages();
    });

    function goTo(page) {
      window.location.href = page;
    }

    function handleCredentialResponse(response) {
      idToken = response.credential;
      localStorage.setItem("gamefinder_token", idToken);
      document.getElementById("userStatus").innerText = "Signed in with Google";
    }

    function logout() {
      idToken = null;
      localStorage.removeItem("gamefinder_token");
      document.getElementById("userStatus").innerText = "Not signed in";
    }

    async function loadEventDetails() {
      if (!eventId) {
        document.getElementById("eventDetails").innerHTML = "<p>No event selected.</p>";
        return;
      }

      const response = await fetch(`${API_URL}/events/${eventId}`);
      const event = await response.json();

      if (!response.ok) {
        document.getElementById("eventDetails").innerHTML = "<p>Event not found.</p>";
        return;
      }

      document.getElementById("eventDetails").innerHTML = `
        <h2>${event.title}</h2>
        <p><strong>Category:</strong> ${event.category}</p>
        <p><strong>Location:</strong> ${event.location}</p>
        <p><strong>Date:</strong> ${event.date}</p>
        <p><strong>Time:</strong> ${event.time}</p>
        <p>${event.description}</p>
      `;

      const participantsDiv = document.getElementById("participants");

      if (!event.joinedBy || event.joinedBy.length === 0) {
        participantsDiv.innerHTML = "<p>No participants yet.</p>";
        return;
      }

      participantsDiv.innerHTML = "<ul>" +
        event.joinedBy.map(email => `<li>${email}</li>`).join("") +
        "</ul>";
    }

    async function loadMessages() {
      if (!eventId) {
        return;
      }

      const response = await fetch(`${API_URL}/events/${eventId}/messages`);
      const messages = await response.json();

      const messagesDiv = document.getElementById("messages");
      messagesDiv.innerHTML = "";

      if (messages.length === 0) {
        messagesDiv.innerHTML = "<p>No messages yet.</p>";
        return;
      }

      messages.forEach(msg => {
        const date = new Date(msg.createdAt).toLocaleString();

        messagesDiv.innerHTML += `
          <div class="message">
            <p><strong>${msg.userEmail}</strong></p>
            <p>${msg.message}</p>
            <small>${date}</small>
          </div>
        `;
      });
    }

    async function sendMessage() {
      if (!idToken) {
        document.getElementById("chatStatus").innerText = "Please sign in first.";
        return;
      }

      const message = document.getElementById("messageInput").value.trim();

      if (!message) {
        document.getElementById("chatStatus").innerText = "Message cannot be empty.";
        return;
      }

      const response = await fetch(`${API_URL}/events/${eventId}/messages`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${idToken}`
        },
        body: JSON.stringify({ message })
      });

      const result = await response.json();

      if (!response.ok) {
        document.getElementById("chatStatus").innerText = result.message || "Could not send message.";
        return;
      }

      document.getElementById("messageInput").value = "";
      document.getElementById("chatStatus").innerText = "Message sent.";
      loadMessages();
    }
  </script>
</body>
</html>
